# =============================================================================
# API – REST gateway serving telemetry and GreenOps endpoints
#
# Mounts the PVC of collector-0 (read-only) so the API can query the SQLite
# database written by that pod.  A podAffinity hint asks the scheduler to
# place the API pod on the same node as collector-0 (required for
# ReadWriteOnce PVCs on most standard StorageClasses).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ include "gpu-telemetry.namespace" . }}
  labels:
    {{- include "gpu-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "gpu-telemetry.selectorLabels" (dict "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-telemetry.selectorLabels" (dict "component" "api") | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 15
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: collector
                    statefulset.kubernetes.io/pod-name: collector-0
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: {{ include "gpu-telemetry.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["api"]
          env:
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
          volumeMounts:
            - name: collector-data
              mountPath: /data
              readOnly: true
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: collector-data
          persistentVolumeClaim:
            claimName: collector-data-collector-0
            readOnly: true
