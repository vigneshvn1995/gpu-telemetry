# =============================================================================
# Streamer – continuously publishes DCGM CSV rows to the broker
#
# Two replicas fan out the same CSV file independently, simulating multiple
# data-source agents.  In production each pod would point at a different
# physical host's metrics endpoint.
#
# The CSV file is baked into the container image at /app/data/.
# To use a different file, mount a ConfigMap or PVC over /app/data/.
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamer
  namespace: gpu-telemetry
  labels:
    app.kubernetes.io/name: streamer
    app.kubernetes.io/part-of: gpu-telemetry
    app.kubernetes.io/component: ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: streamer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamer
        app.kubernetes.io/part-of: gpu-telemetry
        app.kubernetes.io/component: ingest
    spec:
      terminationGracePeriodSeconds: 10
      # Wait for the broker to be reachable before starting.
      initContainers:
        - name: wait-for-broker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z broker 7777; do
                echo "waiting for broker:7777…"
                sleep 2
              done
      containers:
        - name: streamer
          image: gpu-telemetry:latest
          imagePullPolicy: IfNotPresent
          command: ["streamer"]
          env:
            - name: MQ_ADDR
              value: "broker:7777"
            - name: STREAMER_CSV
              value: "/app/data/sample_metrics.csv"
            - name: STREAMER_LOOP
              value: "true"
            - name: STREAMER_DELAY
              value: "50ms"
            - name: STREAMER_TOPIC_PFX
              value: "telemetry.gpu"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
